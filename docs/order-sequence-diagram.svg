<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1880" viewBox="0 0 1500 1880" role="img" aria-labelledby="title desc">
  <title id="title">Order Service Sequence Diagram</title>
  <desc id="desc">Static sequence diagram for the order state machine service.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .note { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; }
      .section { fill: #fafafa; stroke: #d1d5db; stroke-width: 1.5; }
      .line { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .return { stroke: #111827; stroke-width: 1.5; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
      .lifeline { stroke: #9ca3af; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .altbox { fill: none; stroke: #6b7280; stroke-width: 1.5; }
      .divider { stroke: #6b7280; stroke-width: 1.2; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="1880" fill="#ffffff"/>
  <text x="40" y="50" class="title">Order Service Sequence Diagram</text>
  <text x="40" y="78" class="text">Aligned with the current implementation in the repository.</text>

  <rect x="70" y="100" width="140" height="40" class="box"/>
  <text x="140" y="126" text-anchor="middle" class="label">Client</text>
  <rect x="320" y="100" width="190" height="40" class="box"/>
  <text x="415" y="126" text-anchor="middle" class="label">OrderController</text>
  <rect x="600" y="100" width="170" height="40" class="box"/>
  <text x="685" y="126" text-anchor="middle" class="label">OrderService</text>
  <rect x="900" y="100" width="180" height="40" class="box"/>
  <text x="990" y="126" text-anchor="middle" class="label">OrderRepository</text>
  <rect x="1200" y="100" width="160" height="40" class="box"/>
  <text x="1280" y="126" text-anchor="middle" class="label">PaymentGateway</text>

  <line x1="140" y1="140" x2="140" y2="1830" class="lifeline"/>
  <line x1="415" y1="140" x2="415" y2="1830" class="lifeline"/>
  <line x1="685" y1="140" x2="685" y2="1830" class="lifeline"/>
  <line x1="990" y1="140" x2="990" y2="1830" class="lifeline"/>
  <line x1="1280" y1="140" x2="1280" y2="1830" class="lifeline"/>

  <rect x="40" y="170" width="1420" height="160" class="section"/>
  <rect x="55" y="182" width="160" height="28" class="note"/>
  <text x="135" y="201" text-anchor="middle" class="small">Create order</text>
  <line x1="140" y1="235" x2="415" y2="235" class="line"/>
  <text x="278" y="226" text-anchor="middle" class="text">POST /orders</text>
  <line x1="415" y1="265" x2="685" y2="265" class="line"/>
  <text x="550" y="256" text-anchor="middle" class="text">createOrder(request)</text>
  <line x1="685" y1="295" x2="990" y2="295" class="line"/>
  <text x="838" y="286" text-anchor="middle" class="text">save(new Order(INITIALIZED))</text>
  <line x1="990" y1="325" x2="685" y2="325" class="return"/>
  <text x="838" y="316" text-anchor="middle" class="text">Order</text>
  <line x1="685" y1="355" x2="415" y2="355" class="return"/>
  <text x="550" y="346" text-anchor="middle" class="text">Order</text>
  <line x1="415" y1="385" x2="140" y2="385" class="return"/>
  <text x="278" y="376" text-anchor="middle" class="text">201 Created + OrderResponse</text>

  <rect x="40" y="430" width="1420" height="145" class="section"/>
  <rect x="55" y="442" width="150" height="28" class="note"/>
  <text x="130" y="461" text-anchor="middle" class="small">Get order</text>
  <line x1="140" y1="495" x2="415" y2="495" class="line"/>
  <text x="278" y="486" text-anchor="middle" class="text">GET /orders/{orderId}</text>
  <line x1="415" y1="525" x2="685" y2="525" class="line"/>
  <text x="550" y="516" text-anchor="middle" class="text">getOrder(orderId)</text>
  <line x1="685" y1="555" x2="990" y2="555" class="line"/>
  <text x="838" y="546" text-anchor="middle" class="text">findById(orderId)</text>
  <line x1="990" y1="585" x2="685" y2="585" class="return"/>
  <text x="838" y="576" text-anchor="middle" class="text">Order</text>
  <line x1="685" y1="615" x2="415" y2="615" class="return"/>
  <text x="550" y="606" text-anchor="middle" class="text">Order</text>
  <line x1="415" y1="645" x2="140" y2="645" class="return"/>
  <text x="278" y="636" text-anchor="middle" class="text">200 OK + OrderResponse</text>

  <rect x="40" y="690" width="1420" height="410" class="section"/>
  <rect x="55" y="702" width="175" height="28" class="note"/>
  <text x="143" y="721" text-anchor="middle" class="small">Authorize order</text>
  <line x1="140" y1="760" x2="415" y2="760" class="line"/>
  <text x="278" y="751" text-anchor="middle" class="text">POST /orders/{orderId}/authorize + PaymentRequest</text>
  <line x1="415" y1="790" x2="685" y2="790" class="line"/>
  <text x="550" y="781" text-anchor="middle" class="text">authorizeOrder(orderId, paymentRequest, scenario)</text>
  <line x1="685" y1="820" x2="990" y2="820" class="line"/>
  <text x="838" y="811" text-anchor="middle" class="text">findById(orderId)</text>
  <line x1="990" y1="850" x2="685" y2="850" class="return"/>
  <text x="838" y="841" text-anchor="middle" class="text">Order(INITIALIZED)</text>
  <line x1="685" y1="880" x2="685" y2="915" class="line"/>
  <text x="805" y="901" class="text">derive last4 from cardNumber</text>
  <line x1="685" y1="945" x2="1280" y2="945" class="line"/>
  <text x="983" y="936" text-anchor="middle" class="text">authorizePayment(order, scenario)</text>

  <rect x="610" y="970" width="790" height="195" class="altbox"/>
  <text x="625" y="990" class="small">alt</text>
  <text x="655" y="990" class="small">authorization approved</text>
  <line x1="610" y1="1065" x2="1400" y2="1065" class="divider"/>
  <text x="655" y="1088" class="small">else authorization declined</text>

  <line x1="1280" y1="1015" x2="685" y2="1015" class="return"/>
  <text x="983" y="1006" text-anchor="middle" class="text">approved</text>
  <line x1="685" y1="1045" x2="990" y2="1045" class="line"/>
  <text x="838" y="1036" text-anchor="middle" class="text">save(Order -&gt; PAYMENT_AUTHORIZED)</text>

  <line x1="1280" y1="1115" x2="685" y2="1115" class="return"/>
  <text x="983" y="1106" text-anchor="middle" class="text">declined</text>
  <line x1="685" y1="1145" x2="990" y2="1145" class="line"/>
  <text x="838" y="1136" text-anchor="middle" class="text">save(Order -&gt; REJECTED)</text>

  <line x1="990" y1="1175" x2="685" y2="1175" class="return"/>
  <text x="838" y="1166" text-anchor="middle" class="text">saved Order</text>
  <line x1="685" y1="1205" x2="415" y2="1205" class="return"/>
  <text x="550" y="1196" text-anchor="middle" class="text">Order</text>
  <line x1="415" y1="1235" x2="140" y2="1235" class="return"/>
  <text x="278" y="1226" text-anchor="middle" class="text">200 OK + OrderResponse</text>

  <rect x="40" y="1280" width="1420" height="420" class="section"/>
  <rect x="55" y="1292" width="175" height="28" class="note"/>
  <text x="143" y="1311" text-anchor="middle" class="small">Complete order</text>
  <line x1="140" y1="1350" x2="415" y2="1350" class="line"/>
  <text x="278" y="1341" text-anchor="middle" class="text">POST /orders/{orderId}/complete</text>
  <line x1="415" y1="1380" x2="685" y2="1380" class="line"/>
  <text x="550" y="1371" text-anchor="middle" class="text">completeOrder(orderId, scenario)</text>
  <line x1="685" y1="1410" x2="990" y2="1410" class="line"/>
  <text x="838" y="1401" text-anchor="middle" class="text">findById(orderId)</text>
  <line x1="990" y1="1440" x2="685" y2="1440" class="return"/>
  <text x="838" y="1431" text-anchor="middle" class="text">Order(PAYMENT_AUTHORIZED)</text>
  <line x1="685" y1="1470" x2="1280" y2="1470" class="line"/>
  <text x="983" y="1461" text-anchor="middle" class="text">completeAuthorizedOrder(order, scenario)</text>

  <rect x="610" y="1495" width="790" height="270" class="altbox"/>
  <text x="625" y="1515" class="small">alt</text>
  <text x="655" y="1515" class="small">completion succeeded</text>
  <line x1="610" y1="1585" x2="1400" y2="1585" class="divider"/>
  <text x="655" y="1608" class="small">else completion failed</text>
  <line x1="610" y1="1690" x2="1400" y2="1690" class="divider"/>
  <text x="655" y="1713" class="small">void branches</text>

  <line x1="1280" y1="1540" x2="685" y2="1540" class="return"/>
  <text x="983" y="1531" text-anchor="middle" class="text">success</text>
  <line x1="685" y1="1570" x2="990" y2="1570" class="line"/>
  <text x="838" y="1561" text-anchor="middle" class="text">save(Order -&gt; COMPLETE)</text>

  <line x1="1280" y1="1635" x2="685" y2="1635" class="return"/>
  <text x="983" y="1626" text-anchor="middle" class="text">failed</text>
  <line x1="685" y1="1665" x2="1280" y2="1665" class="line"/>
  <text x="983" y="1656" text-anchor="middle" class="text">voidPayment(order, scenario)</text>

  <line x1="1280" y1="1735" x2="685" y2="1735" class="return"/>
  <text x="983" y="1726" text-anchor="middle" class="text">success or failed</text>
  <line x1="685" y1="1765" x2="990" y2="1765" class="line"/>
  <text x="838" y="1756" text-anchor="middle" class="text">save(Order -&gt; CANCELLED or NEEDS_ATTENTION)</text>

  <line x1="990" y1="1795" x2="685" y2="1795" class="return"/>
  <text x="838" y="1786" text-anchor="middle" class="text">saved Order</text>
  <line x1="685" y1="1825" x2="415" y2="1825" class="return"/>
  <text x="550" y="1816" text-anchor="middle" class="text">Order</text>
  <line x1="415" y1="1855" x2="140" y2="1855" class="return"/>
  <text x="278" y="1846" text-anchor="middle" class="text">200 OK + OrderResponse / OrderHistoryResponse</text>
</svg>
